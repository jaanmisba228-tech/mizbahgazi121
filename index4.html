<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizbah Gazi | Customised Gifts & Mehndi</title>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --soft-gold: #d4a373;
            --bg-color: #fffafb;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-color); color: #333; }
        header { background: white; text-align: center; padding: 40px 20px; border-bottom: 4px solid var(--primary-pink); }
        .logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-pink); }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        h2 { border-left: 6px solid var(--soft-gold); padding-left: 15px; margin-top: 40px; color: #444; }
        
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;
        }
        .img-card { 
            aspect-ratio: 1 / 1; 
            background: #fff; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .img-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            display: block;
        }

        .order-box { background: white; padding: 30px; border-radius: 20px; margin: 50px 0; border: 1px solid #ffebee; }
        .policy { color: #d63031; text-align: center; font-weight: bold; margin-bottom: 20px; border: 2px dashed var(--primary-pink); padding: 10px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/N29n0sFr/IMG-0526.png" class="logo" crossorigin="anonymous" referrerpolicy="no-referrer">
    <h1>Mizbah Gazi</h1>
    <p>Mehndi Artist | Customised Gifts | Custom Crochet</p>
</header>

<div class="container">
    <div class="policy">⚠️ NO EXCHANGE NO RETURN POLICY</div>

    <h2>🧶 Custom Crochet & Handmade</h2>
    <div class="gallery-grid">
        <div class="img-card"><img src="https://i.ibb.co/N29n0sFr/IMG-0526.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/d0TD4d9t/IMG-0527.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/qY6YrfKg/IMG-0528.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/Wvjvy7wZ/IMG-0525.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/bgRVfrsc/IMG-0012.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
    </div>

    <h2>🖼️ Personalized Frames</h2>
    <div class="gallery-grid">
        <div class="img-card"><img src="https://i.ibb.co/DPGMLbQB/48-F5-BFC6-A1-FE-4-B3-B-AD83-FD1-B8-C8-FAAF3.jpg" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/Pvd3vsMb/IMG-0216.jpg" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/ymtcnN83/IMG-0215.jpg" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/WWN8bRGr/181-E60-BF-77-DD-41-E1-A412-B122-E1-F6553-F.jpg" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
    </div>

    <h2>💍 Jewellery & Accessories</h2>
    <div class="gallery-grid">
        <div class="img-card"><img src="https://i.ibb.co/gbRbX3rB/IMG-0015.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/1tT3xhwM/IMG-0014.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/99GgRGXz/IMG-0016.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/Q3FphZ3t/IMG-0013.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>

    </div>

        <div class="img-card"><img src="https://i.ibb.co/Fbh9Wf9K/IMG-0077.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/Kxq6RVDL/IMG-0078.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
        <div class="img-card"><img src="https://i.ibb.co/yvwGLzX/IMG-0079.png" crossorigin="anonymous" referrerpolicy="no-referrer"></div>
    </div>

    <div class="order-box">
        <h2 style="border:none; text-align:center;">🛒 Place Your Order</h2>
        <form id="orderForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <select id="prod">
                <option value="Crochet">Crochet Item</option>
                <option value="Frame">Personalized Frame</option>
                <option value="Mehndi">Mehndi Booking</option>
            </select>
            <textarea id="addr" placeholder="Full Address" required></textarea>
            <button type="button" class="btn-whatsapp" onclick="sendToWA()">Send Order to WhatsApp</button>
        </form>
    </div>
</div>

<script>
    function sendToWA() {
        const phone = "919103803607";
        const msg = `Order: ${document.getElementById('prod').value}%0AName: ${document.getElementById('name').value}%0AAddress: ${document.getElementById('addr').value}`;
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
